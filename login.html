<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood System Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f6f9; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { max-width: 400px; width: 100%; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="card login-card bg-white">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">🌊 Flood Portal</h2>
            <p class="text-muted">Sign in to access system metrics</p>
        </div>

        <div id="error-container"></div>

        <form method="POST" action="login.php">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                Sign In
            </button>
        </form>
    </div>

    <script>
        // Simple helper to catch credential errors if login.php boots us back here
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            const errorType = urlParams.get('error');
            const container = document.getElementById('error-container');
            container.className = "alert alert-danger mb-3";
            
            if (errorType === 'failed') {
                container.innerText = "Invalid username or password match configuration.";
            } else if (errorType === 'empty') {
                container.innerText = "Please fill out all authorization fields.";
            } else {
                container.innerText = "An error occurred during authentication.";
            }
        }
    </script>
</body>
</html>
