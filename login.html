<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood System Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f6f9; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { max-width: 400px; width: 100%; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="card login-card bg-white">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">🌊 Flood Portal</h2>
            <p class="text-muted">Sign in to access system metrics</p>
        </div>

        <div id="error-alert" class="alert alert-danger d-none" role="alert"></div>

        <form id="authForm" method="POST" action="login.php">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-2 fw-semibold">
                Sign In
            </button>
        </form>
    </div>

    <script>
        // Intercept normal submission to handle any errors elegantly
        document.getElementById('authForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const form = e.target;
            const btn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('error-alert');
            
            btn.disabled = true;
            btn.innerText = "Verifying...";
            alertBox.classList.add('d-none');

            try {
                const formData = new FormData(form);
                const response = await fetch('login.php', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.status === 'success' || data.redirect) {
                    // Force the browser to relocate instantly
                    window.location.href = data.redirect || 'index.php';
                } else {
                    throw new Error(data.error || "Invalid user credentials.");
                }
            } catch (err) {
                alertBox.innerText = err.message;
                alertBox.classList.remove('d-none');
                btn.disabled = false;
                btn.innerText = "Sign In";
            }
        });
    </script>
</body>
</html>
