<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood System Authentication Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f6f9; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { max-width: 400px; width: 100%; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="card login-card bg-white">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">🌊 Flood Portal</h2>
            <p class="text-muted">Sign in to access real-time system monitoring</p>
        </div>

        <div id="alert-box" class="alert d-none" role="alert"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Enter username" required autocomplete="username">
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" id="btn-submit" class="btn btn-primary w-100 py-2 fw-semibold">
                <span id="btn-text">Sign In</span>
                <span id="btn-spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Stop standard browser page reloads

            const alertBox = document.getElementById('alert-box');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const submitBtn = document.getElementById('btn-submit');

            // Toggle visual loading states
            alertBox.className = "alert d-none";
            btnText.innerText = "Verifying...";
            btnSpinner.classList.remove('d-none');
            submitBtn.disabled = true;

            const payload = {
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value.trim()
            };

            try {
                // Post directly to our non-OTP backend processor
                const response = await fetch('login.html', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.status === 'success' || data.redirect) {
                    alertBox.className = "alert alert-success d-block";
                    alertBox.innerText = data.message || "Access Granted! Redirecting...";
                    
                    // 🔥 THE FORCE REDIRECT: Escapes the loading page completely
                    setTimeout(() => {
                        window.location.replace(data.redirect || 'index.php');
                    }, 800);
                } else {
                    // Show validation failure messages clearly (e.g. invalid passwords)
                    throw new Error(data.error || "Authentication structural mismatch.");
                }

            } catch (err) {
                alertBox.className = "alert alert-danger d-block";
                alertBox.innerText = err.message;
                
                // Reset interaction nodes back to active state on error
                btnText.innerText = "Sign In";
                btnSpinner.classList.add('d-none');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
